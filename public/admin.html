<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArpiDent — панель администратора</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="admin-body">
<main class="admin-standalone">
  <section class="admin-cover">
    <div class="auth-orb"></div>
    <h1>Панель администратора ArpiDent</h1>
    <p>Отдельное служебное окно для управления заявками, статусами записей и расписанием врачей.</p>
    <a class="btn btn--outline" href="/">Вернуться на сайт</a>
  </section>
  <section class="admin-workspace">
    <div id="admin-login-box" class="auth-card">
      <h2>Вход администратора</h2>
      <div class="form-group"><label>Логин</label><input id="admin-login-input" class="form-input" value="admin"></div>
      <div class="form-group"><label>Пароль</label><input id="admin-password-input" class="form-input" type="password" value="admin123"></div>
      <button class="btn btn--primary btn--full" onclick="adminLogin()">Войти</button>
      <p class="admin-hint">Учебные данные: admin / admin123</p>
    </div>
    <div id="admin-panel-box" class="hidden"></div>
  </section>
</main>
<script src="/admin.js"></script>
</body>
</html>
